<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZ SHOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #1a1a2e; padding: 20px; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; background: #16213e; border-radius: 10px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .header { background: #0f3460; text-align: center; padding: 25px; }
        .header h1 { font-size: 28px; color: #e94560; }
        .content { padding: 25px; }
        .product { background: #0f3460; padding: 20px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .product h3 { font-size: 20px; margin-bottom: 10px; color: #fff; }
        .desc { color: #ddd; margin-bottom: 12px; line-height: 1.5; }
        .price { font-size: 22px; font-weight: bold; color: #e94560; margin-bottom: 20px; }
        .buy-btn { display: inline-block; padding: 12px 30px; background: #e94560; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 18px; }
        .buy-btn:hover { background: #d63447; }
        .contact { background: #0f3460; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .contact h3 { margin-bottom: 10px; color: #fff; }
        .contact p { color: #ddd; line-height: 1.6; }
        .warning { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SZ SHOP</h1>
            <p>ร้านจำหน่ายรหัสเกมราคาประหยัด</p>
        </div>
        <div class="content">
            <div class="product">
                <h3>รหัสฟีฟายราคาถูก พร้อมเล่น</h3>
                <p class="desc">บัญชีพร้อมใช้งาน เล่นได้ทันที ไม่ต้องรอ</p>
                <div class="price">ราคา 25 บาท</div>
                <!-- เปลี่ยน # เป็นลิงก์ไลน์/เพจ/ช่องทางชำระเงินของคุณ -->
                <a href="#" class="buy-btn">กดซื้อทันที</a>
            </div>
            <div class="contact">
                <h3>ข้อมูลเพิ่มเติม</h3>
                <p>กรุณาใส่รายละเอียดการติดต่อและการชำระเงินที่นี่</p>
            </div>
        </div>
    </div>
    <p class="warning">ผู้จัดทำเว็บนี้รับทราบความเสี่ยงและรับผิดชอบเนื้อหาทั้งหมดด้วยตนเอง</p>
</body>
</html>
